<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/login/style.css">
</head>
<body>

<div class="login-wrap">

    <h2>Sign In</h2>
    <p class="sub">Enter your email and we'll send you a one-time code to get in.</p>

    <!-- EMAIL ROW: input + resend button sit side by side -->
    <div class="email-row">
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
        <button id="resendBtn" onclick="sendOTP()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 2v6h-6"/>
                <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
                <path d="M3 22v-6h6"/>
                <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
            </svg>
            <span>Resend OTP</span>
        </button>
    </div>

    <button id="sendBtn" onclick="sendOTP()">Send OTP</button>

    <!-- OTP (hidden initially) -->
    <div id="otpSection">
        <div class="section-label">One-time code</div>
        <p class="sub small">Check your inbox - a 6-digit code is on its way.</p>
        <input id="otp" placeholder="······" maxlength="6" autocomplete="one-time-code">
        <button class="full-btn" onclick="verifyOTP()">Verify &amp; Continue</button>
    </div>

    <p id="status"></p>

</div>

<script src="/login/client.js"></script>

</body>
</html>
